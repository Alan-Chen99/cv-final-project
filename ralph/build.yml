# ralph/build.yml — Build workflow
#
# Run:
# ralph -c /workspace/ralph/build.yml run

cli:
  backend: "claude"

adapters:
  claude:
    timeout: 1440 # 1 day — CLI executor inactivity before SIGTERM

event_loop:
  prompt_file: "PROMPT.md"
  completion_promise: "LOOP_COMPLETE"
  max_iterations: 30
  starting_event: "work.start"
  max_runtime_seconds: 172800 # 48h
  cooldown_delay_seconds: 10
  max_consecutive_failures: 5

core:
  guardrails:
    - "Fresh context each iteration — save learnings to memories for next time"
    # - "Verification is mandatory — tests/typecheck/lint/audit must pass"
    - "Automatic checks are NOT sufficient. Review blind spots manually."
    - "YAGNI ruthlessly — no speculative features"
    - "KISS always — simplest solution that works"
    - "Non-obvious decisions MUST be written to decisions.md"

    - "Reproducibility: all results reproducible, scripts checked into git, commit used specified"
    - "One experiment at a time. Do not batch-submit or work on multiple experiments concurrently."
    - "No cross-iteration jobs. Experiments started must finish within the same iteration before proceeding."
    - "Time is finite. Record wall-clock time in scratchpad.md. Budget iterations."
    - "Avoid polling: use /long-running-commands skill"
    - "Within an iteration, hold compute resources with `salloc`. Avoid talking to nodes you did not allocate. `scancel` all allocations before the next iteration."
    - "Do not send jobs to nodes not created by you — They are working on unrelated tasks."
    - "Track ALL files in git — scratchpad, notes, intermediate results, everything. You can always delete later; untracked files are invisible to future iterations."
    - "Allocations: generate a 2-word random prefix at the start of each run (e.g. `shuf -n2 /usr/share/dict/words | tr '\\n' '-' | tr '[:upper:]' '[:lower:]'`). Use this prefix for all salloc job names, temp dirs, and output files. Scope: one prefix per run chain (worker→worker→...→worker→summarizer). Persist the prefix in scratchpad.md. If you find dangling allocations matching your chain's prefix, they're yours — safe to kill."

# Note: topics such as `build.done` and `review.done` are special-cased for evidence in ralph-orchestrator;
# Detection is fragile though, so not used here
hats:
  worker:
    name: "Worker"
    description: "Continue to work on the task from the prompt"
    triggers: ["work.start", "work.iteration", "work.interrupted"]
    publishes: ["work.iteration", "work.fixed-point"]
    default_publishes: "work.interrupted"
    instructions: |
      Start: Load /long-running-commands, /slurm-preemptable skills; Write down current commit and current time.

      Then: review current status.
      Find 3 or more most significant problems or concerns. Then, write these into scratchpad.md.

      Types of concerns:
        - Fact: prior agent claimed a fact, which is disproven
           - Possible fix: Exhaustive review on all work or decisions made effected by the false assumption
        - Quality: quality of current code or work.
           - Possible fix: improve, explore missing directions
        - Workflow: prior agent should have done X, they didnt
           - This MOST IMPORTANT and represent the most common failure point
           - If prior agent did not run tests, it is NOT sufficient to just run tests. You do NOT have enough context to interpret what a "test pass" mean, and what a "test fail" mean.
           - If prior agent did not document how a result is dervied -- result is invalid, all conclusions based on result also invalid. NEVER assume where results come from. Steps not written -> discard data completely.
           - Possible fix: review changes carefully, or revert to the point before things went wrong.

      Then: Continue to work on the task from the prompt; commit changes with one or more commits.
      This means:
        - Completing more portions of the task
        - Improve, change or refactor prior work

      Do ONE thing per iteration. DO NOT try to complete the entire task in one iteration.
      If you find that you have been doing many distinct things: STOP and leave to the next iteration.

      REQUIRED skills to use:
        - Before making decisions -> /decision-critic
        - Need to debug -> /problem-analysis

      REQUIRED checklist for ALL iterations:
      - [ ] decisions.md, memories.md, scratchpad.md are populated
      - [ ] all changes committed or discarded: clean git when you leave
      - [ ] starting and ending commit, starting and ending wall-clock written to scratchpad.md
      - [ ] CRITICAL: No dangling background commands. (This is NOT about GPU jobs from salloc/srun — it is about local bash commands auto-backgrounded by Claude Code's timeout.) Run `ps auxf` without any grep or filtering, and read the FULL output. Kill every process you don't recognize as essential (sleep, find, python, cp, mv, timeout, etc.) via `kill <pid>`. Not doing so causes the harness to hang indefinitely.

      On `work.interrupted`: the prior agent didn't signal an event; if work cannot continue, declare fixed-point.

      Publish `work.iteration` if ANY change is made, publish `work.fixed-point` otherwise.
      Fixed-point means ONLY `.ralph/` changes (scratchpad, memories, decisions). Doc updates, report updates, or any other file changes count as iteration, not fixed-point.

  # Summarizer is forced to complete the loop, potentially declare failure
  # Without this, loop by definition will always declare "success" which is not honest
  Summarizer:
    name: "Summarizer"
    description: "Summarize workflow, with a focus on structural flaws that can invalidate output (ex: is claims verified in the workflow?) rather than output flaws (is the claim true?). Write output to TASK_SUMMARY.md as a report to user."
    triggers: ["work.fixed-point"]
    publishes: ["LOOP_COMPLETE"]
    default_publishes: "LOOP_COMPLETE"
    instructions: |
      Summarize workflow: Understand what happened in the workflow; write summary to TASK_SUMMARY.md for user to read.

      Your job is to honestly identify problems in completion or workflow.
      You do not spend significant time or effort to check any claims; Rather, you review whether claims are properly verifiedin prior iterations, whether decisions are made with justification and had independent verification, or any other flaws that may cause degration in output quality.

      1. Identify possible systematic problems using agent notes; ex: direction not considered at all, analysis done with bias
      2. Review for rule violations (CLAUDE.md, rules/)
      3. Review whether output got sufficient testing (NOT "it works becuase tests passed"). Identify failure classes that will be systematically not-caught
      4. Verify whether claims added in `decisions.md, scratchpad.md, memories.md` underwent independent verification

      Include:

      1. Table of what happened each iteration
      2. Table of all claims made: claim, what verification is done, whether you were able to reproduce the verification (if it is just a command, or are directly actionable).
      3. Problems and concerns
